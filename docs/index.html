<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://dns.google; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; manifest-src 'self';">
    <meta name="theme-color" content="#07090a">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <title>git·text</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap');

        :root {
            --ink:        #07090a;
            --ink-2:      #0d1012;
            --surface:    #11161a;
            --surface-2:  #161c21;
            --rule:       #232a30;
            --rule-soft:  #1a2024;
            --text:       #d8d2c2;
            --text-dim:   #6a7178;
            --text-soft:  #8d949b;
            --text-bright:#f2ecdd;
            --phosphor:   #b6ff66;
            --phosphor-d: #79c43d;
            --amber:      #ffb648;
            --blood:      #ff5050;
            --ion:        #66e0ff;
            --plum:       #d49bff;
            --paper:      #ebe6da;

            --mono: 'IBM Plex Mono', 'Berkeley Mono', 'Menlo', monospace;
        }

        html[data-theme="paper"] {
            --ink:        #f3eee2;
            --ink-2:      #ebe6d8;
            --surface:    #e8e3d4;
            --surface-2:  #ddd6c2;
            --rule:       #b9b0a0;
            --rule-soft:  #d4cdb9;
            --text:       #1a1d1f;
            --text-dim:   #6c7178;
            --text-soft:  #46494d;
            --text-bright:#0a0a0a;
            --phosphor:   #c83a30;
            --phosphor-d: #a82820;
            --amber:      #b88800;
            --blood:      #c83a30;
            --ion:        #1f6bb0;
            --plum:       #7838b8;
        }

        html[data-wrap="1"] #highlight-layer,
        html[data-wrap="1"] #editor { white-space: pre-wrap; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--mono);
            font-feature-settings: "ss03" on, "ss05" on, "calt" on;
            background:
                radial-gradient(1200px 600px at 50% -200px, rgba(182,255,102,0.04), transparent 70%),
                linear-gradient(180deg, var(--ink-2) 0%, var(--ink) 60%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Grain overlay — sits above background, below content */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.4' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.45  0 0 0 0 0.55  0 0 0 0 0.4  0 0 0 0.7 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        }

        /* Dot grid — very faint */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.32;
            background-image: radial-gradient(rgba(216,210,194,0.06) 1px, transparent 1px);
            background-size: 18px 18px;
        }

        header, main, .status-bar, .toast, .modal { position: relative; z-index: 1; }

        /* =================== HEADER =================== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.25rem;
            padding: 0.85rem 1.25rem 0.85rem 1.5rem;
            border-bottom: 1px solid var(--rule);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.012), transparent),
                var(--surface);
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 0.55rem;
            user-select: none;
        }

        .logo-icon {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 13px;
            line-height: 1;
            letter-spacing: 0.04em;
            color: var(--ink);
            background: var(--phosphor);
            padding: 4px 6px 3px;
            text-transform: uppercase;
            box-shadow: 0 0 0 1px var(--phosphor), 0 0 18px rgba(182,255,102,0.25);
        }

        h1 {
            font-family: var(--mono);
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-bright);
            letter-spacing: -0.01em;
            display: inline-flex;
            align-items: baseline;
            gap: 0;
        }
        h1::before { content: 'git'; color: var(--text-bright); }
        h1::after  { content: 'text'; color: var(--text-bright); }
        h1 .slash {
            color: var(--phosphor);
            padding: 0 0.05em;
            font-weight: 700;
        }

        .tagline {
            color: var(--text-dim);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-left: 1px solid var(--rule);
            padding-left: 0.85rem;
            margin-left: 0.4rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-wrap: wrap;
        }

        .stats {
            font-size: 0.72rem;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            text-transform: uppercase;
            padding: 0.35rem 0.6rem;
            background: var(--ink);
            border: 1px solid var(--rule);
            margin-right: 0.35rem;
            font-variant-numeric: tabular-nums;
        }

        /* =================== BUTTONS =================== */
        button {
            font-family: var(--mono);
            font-weight: 500;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-soft);
            background: transparent;
            border: 1px solid var(--rule);
            padding: 0.42rem 0.7rem;
            cursor: pointer;
            border-radius: 0;
            transition: color .12s ease, background .12s ease, border-color .12s ease, transform .12s ease;
            position: relative;
        }

        button::before {
            content: '[';
            color: var(--text-dim);
            margin-right: 0.45em;
            transition: color .12s ease;
        }
        button::after {
            content: ']';
            color: var(--text-dim);
            margin-left: 0.45em;
            transition: color .12s ease;
        }

        button:hover:not(:disabled) {
            color: var(--text-bright);
            border-color: var(--text-soft);
            background: rgba(216,210,194,0.04);
        }
        button:hover:not(:disabled)::before,
        button:hover:not(:disabled)::after {
            color: var(--phosphor);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.32;
            cursor: not-allowed;
        }

        button.primary {
            color: var(--ink);
            background: var(--phosphor);
            border-color: var(--phosphor);
        }
        button.primary::before, button.primary::after {
            color: rgba(7,9,10,0.55);
        }
        button.primary:hover:not(:disabled) {
            background: var(--phosphor-d);
            border-color: var(--phosphor-d);
            color: var(--ink);
        }

        button.accent {
            color: var(--ion);
            border-color: rgba(102,224,255,0.35);
        }
        button.accent:hover:not(:disabled) {
            background: rgba(102,224,255,0.08);
            border-color: var(--ion);
            color: var(--ion);
        }

        button.lang {
            color: var(--plum);
            border-color: rgba(212,155,255,0.3);
            min-width: 96px;
        }
        button.lang:hover:not(:disabled) {
            background: rgba(212,155,255,0.08);
            border-color: var(--plum);
        }

        button.danger {
            color: var(--blood);
            border-color: rgba(255,80,80,0.3);
        }
        button.danger:hover:not(:disabled) {
            background: rgba(255,80,80,0.1);
            border-color: var(--blood);
        }

        button.active {
            background: var(--phosphor);
            color: var(--ink);
            border-color: var(--phosphor);
            box-shadow: 0 0 0 1px var(--phosphor), 0 0 16px rgba(182,255,102,0.25);
        }
        button.active::before, button.active::after { color: rgba(7,9,10,0.55); }

        /* =================== MAIN / EDITOR =================== */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem 1.25rem;
            overflow: hidden;
        }

        #editor-wrapper {
            display: none;
            flex: 1;
            position: relative;
            border: 1px solid var(--rule);
            background: var(--ink);
            overflow: hidden;
            box-shadow:
                inset 0 0 0 1px rgba(0,0,0,0.4),
                0 18px 60px -30px rgba(0,0,0,0.6);
        }

        /* Corner brackets on editor — top-left + bottom-right diagonal */
        #editor-wrapper::before, #editor-wrapper::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 4;
        }
        #editor-wrapper::before {
            top: 6px; left: 6px;
            border-top: 1px solid var(--phosphor);
            border-left: 1px solid var(--phosphor);
        }
        #editor-wrapper::after {
            bottom: 6px; right: 6px;
            border-bottom: 1px solid var(--phosphor);
            border-right: 1px solid var(--phosphor);
        }

        #line-numbers {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 56px;
            padding: 1.1rem 0.6rem 1.1rem 0;
            text-align: right;
            font-family: var(--mono);
            font-weight: 400;
            font-size: 13px;
            line-height: 1.55;
            color: var(--text-dim);
            background: linear-gradient(90deg, var(--ink-2), var(--ink));
            border-right: 1px solid var(--rule-soft);
            overflow: hidden;
            white-space: pre;
            user-select: none;
            font-variant-numeric: tabular-nums;
        }

        #highlight-layer, #editor {
            position: absolute;
            left: 56px; top: 0; right: 0; bottom: 0;
            padding: 1.1rem 1.25rem;
            font-family: var(--mono);
            font-size: 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            tab-size: 4;
        }

        #highlight-layer {
            color: var(--text);
            pointer-events: none;
            z-index: 1;
        }

        #editor {
            background: transparent;
            color: transparent;
            caret-color: var(--phosphor);
            border: none;
            outline: none;
            resize: none;
            z-index: 2;
        }

        #editor::placeholder {
            color: var(--text-dim);
            opacity: 0.55;
        }

        #editor::selection { background: rgba(182,255,102,0.22); }

        #editor::-webkit-scrollbar { width: 10px; height: 10px; }
        #editor::-webkit-scrollbar-track { background: transparent; }
        #editor::-webkit-scrollbar-thumb {
            background: var(--rule);
            border: 2px solid var(--ink);
            border-radius: 0;
        }
        #editor::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* =================== SYNTAX TOKENS =================== */
        .tok-kw   { color: var(--plum); font-style: italic; }
        .tok-str  { color: #ffc890; }
        .tok-num  { color: #c1ff7a; }
        .tok-cmt  { color: #5a6066; font-style: italic; }
        .tok-op   { color: var(--text); }
        .tok-punc { color: var(--text-dim); }
        .tok-fn   { color: #f0e07a; }
        .tok-type { color: #7becc8; }
        .tok-tag  { color: var(--ion); }
        .tok-attr { color: #b2f2ff; }
        .tok-prop { color: #b2f2ff; }

        /* =================== STATUS BAR =================== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.25rem;
            border-top: 1px solid var(--rule);
            background: var(--surface);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
            gap: 1rem;
        }

        .status-left { display: flex; align-items: center; gap: 1.25rem; }

        .status-indicator { display: flex; align-items: center; gap: 0.5rem; }

        .status-dot {
            width: 7px; height: 7px;
            background: var(--phosphor);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(182,255,102,0.7);
        }
        .status-dot.saving {
            background: var(--amber);
            box-shadow: 0 0 6px rgba(255,182,72,0.65);
            animation: pulse 1s infinite;
        }

        #status-text { color: var(--text-soft); }

        #storage-mode {
            padding: 0.18rem 0.55rem;
            background: var(--ink);
            border: 1px solid var(--rule);
            color: var(--text-soft);
        }

        #url-size { color: var(--text-soft); }
        #url-size::before { content: '·  '; color: var(--text-dim); }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.55; transform: scale(0.85); }
        }

        /* =================== TOAST =================== */
        .toast {
            position: fixed;
            bottom: 4.25rem;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--surface-2);
            color: var(--text-bright);
            padding: 0.55rem 1.1rem;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid var(--rule);
            border-bottom: 2px solid var(--phosphor);
            opacity: 0;
            pointer-events: none;
            transition: opacity .18s ease, transform .18s ease;
            z-index: 1100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast::before {
            content: '›  ';
            color: var(--phosphor);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* =================== LOADING =================== */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            gap: 1.25rem;
        }

        .loading-spinner {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--phosphor);
            letter-spacing: 0.28em;
            text-shadow: 0 0 14px rgba(182,255,102,0.4);
        }
        .loading-spinner::before {
            content: '[ READING ]';
            animation: blink 1.1s steps(2, end) infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.25; }
        }

        .loading-text {
            color: var(--text-dim);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* =================== MODAL =================== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(7,9,10,0.7);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }

        .modal-content {
            position: relative;
            background: var(--surface-2);
            border: 1px solid var(--rule);
            padding: 1.4rem 1.5rem 1.2rem;
            min-width: 420px;
            max-width: 92%;
            max-height: 84vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.5),
                0 30px 80px rgba(0,0,0,0.7);
        }
        /* Corner brackets on modal */
        .modal-content::before, .modal-content::after {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            pointer-events: none;
        }
        .modal-content::before {
            top: 6px; left: 6px;
            border-top: 1px solid var(--phosphor);
            border-left: 1px solid var(--phosphor);
        }
        .modal-content::after {
            bottom: 6px; right: 6px;
            border-bottom: 1px solid var(--phosphor);
            border-right: 1px solid var(--phosphor);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
            border-bottom: 1px dashed var(--rule);
        }

        .modal-title {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-bright);
            font-weight: 600;
        }
        .modal-title::before { content: '›  '; color: var(--phosphor); }

        .modal-close {
            border: 1px solid var(--rule);
            background: transparent;
            color: var(--text-dim);
            font-size: 1rem;
            padding: 0.15rem 0.5rem;
            line-height: 1;
            text-transform: none;
            letter-spacing: 0;
        }
        .modal-close::before, .modal-close::after { display: none; }
        .modal-close:hover {
            color: var(--blood);
            border-color: var(--blood);
            background: rgba(255,80,80,0.08);
        }

        /* =================== PASSWORD FORM =================== */
        .password-form {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        .password-form input {
            background: var(--ink);
            border: 1px solid var(--rule);
            padding: 0.6rem 0.7rem;
            color: var(--text-bright);
            font-family: var(--mono);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            outline: none;
            transition: border-color .12s ease, background .12s ease;
        }
        .password-form input::placeholder {
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.7rem;
        }
        .password-form input:focus {
            border-color: var(--phosphor);
            background: rgba(182,255,102,0.04);
        }

        /* =================== QR =================== */
        #qr-canvas {
            display: none;
            margin: 0 auto;
            background: var(--ink);
            padding: 0.5rem;
            border: 1px solid var(--rule);
            image-rendering: pixelated;
        }

        /* =================== DOCS LIST =================== */
        #docs-list {
            display: none;
            overflow-y: auto;
            max-height: 420px;
            padding-right: 4px;
        }
        #docs-list::-webkit-scrollbar { width: 8px; }
        #docs-list::-webkit-scrollbar-thumb { background: var(--rule); }

        .doc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0.85rem;
            background: var(--ink);
            border: 1px solid var(--rule);
            margin-bottom: 0.5rem;
            transition: border-color .12s ease, background .12s ease;
        }
        .doc-item:hover {
            border-color: var(--text-dim);
            background: var(--surface);
        }

        .doc-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            overflow: hidden;
            flex: 1;
            margin-right: 1rem;
        }
        .doc-title {
            font-size: 0.82rem;
            color: var(--text-bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .doc-meta {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .doc-actions { display: flex; gap: 0.4rem; }
        .doc-actions button { padding: 0.3rem 0.55rem; font-size: 0.65rem; }

        /* =================== DOWNLOAD / SESSION OPTIONS =================== */
        .download-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .download-option {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.85rem 1rem;
            background: var(--ink);
            border: 1px solid var(--rule);
            color: var(--text-bright);
            font-family: var(--mono);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color .12s ease, background .12s ease, transform .12s ease;
            text-align: left;
        }
        .download-option:hover {
            border-color: var(--phosphor);
            background: rgba(182,255,102,0.04);
        }
        .download-option:active { transform: translateY(1px); }
        .download-option::before, .download-option::after { display: none; }
        .download-icon {
            font-size: 0.7rem;
            color: var(--phosphor);
            letter-spacing: 0.06em;
            min-width: 56px;
        }

        .no-docs, .loading-docs, .error {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--text-dim);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        .error { color: var(--blood); }

        /* =================== TABS =================== */
        #tab-strip {
            display: none;
            align-items: stretch;
            gap: 1px;
            background: var(--surface);
            border-bottom: 1px solid var(--rule);
            overflow-x: auto;
            padding: 0 0.5rem;
        }
        .tab {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.75rem;
            background: var(--ink-2);
            border: 1px solid var(--rule);
            border-bottom: none;
            font-size: 0.72rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: pointer;
            margin-top: 0.3rem;
        }
        .tab.active { background: var(--ink); color: var(--text-bright); border-color: var(--phosphor); }
        .tab-close { color: var(--text-dim); }
        .tab-close:hover { color: var(--blood); }
        .tab-add {
            border: 1px dashed var(--rule);
            background: transparent;
            color: var(--text-dim);
            margin-top: 0.3rem;
            padding: 0.45rem 0.75rem;
            font-size: 0.7rem;
        }
        .tab-add::before, .tab-add::after { display: none; }

        /* =================== SEARCH BAR =================== */
        #search-bar {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.85rem;
            background: var(--surface-2);
            border-bottom: 1px solid var(--rule);
            font-size: 0.72rem;
        }
        #search-bar.show { display: flex; }
        #search-bar input[type="text"], #search-bar input:not([type]) {
            background: var(--ink);
            border: 1px solid var(--rule);
            color: var(--text-bright);
            font-family: var(--mono);
            font-size: 0.78rem;
            padding: 0.35rem 0.5rem;
            outline: none;
        }
        #search-bar #sr-q, #search-bar #sr-r { width: 180px; }
        #search-bar label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.6rem; cursor: pointer; }
        #search-bar button {
            padding: 0.28rem 0.55rem;
            font-size: 0.65rem;
        }
        #search-bar button::before, #search-bar button::after { display: none; }
        #search-bar #sr-count { color: var(--text-dim); letter-spacing: 0.08em; margin-left: 0.4rem; font-size: 0.62rem; }
        #search-bar .tok-match { background: rgba(182,255,102,0.35); color: var(--ink); }

        /* highlight match overlay */
        .tok-match { background: rgba(182,255,102,0.32); color: inherit; box-shadow: 0 0 0 1px rgba(182,255,102,0.5); }

        /* =================== RESPONSIVE =================== */
        @media (max-width: 720px) {
            header { padding: 0.65rem 0.85rem; gap: 0.5rem; }
            .tagline { display: none; }
            h1 { font-size: 0.95rem; }
            .stats { display: none; }
            .header-actions { gap: 0.3rem; }
            button { padding: 0.35rem 0.5rem; font-size: 0.65rem; letter-spacing: 0.05em; }
            button::before, button::after { display: none; }
            main { padding: 0.6rem; }
            #line-numbers { width: 42px; font-size: 12px; padding: 0.65rem 0.4rem 0.65rem 0; }
            #highlight-layer, #editor { left: 42px; font-size: 13px; padding: 0.7rem 0.85rem; }
            .modal-content { min-width: 0; width: 92%; padding: 1.1rem 1.1rem 1rem; }
            .status-bar { padding: 0.45rem 0.85rem; font-size: 0.62rem; gap: 0.6rem; }
            .status-left { gap: 0.6rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">GT</span>
            <h1><span class="slash">/</span></h1>
            <span class="tagline">share text via url</span>
        </div>
        <div class="header-actions">
            <span class="stats" id="stats">0L | 0C | 0B</span>
            <button id="lang-btn" class="lang" disabled>Plain</button>
            <button id="docs-btn" disabled>Docs</button>
            <button id="session-btn" disabled>Session</button>
            <button id="download-btn" disabled>Save</button>
            <button id="encrypt-btn" disabled>Encrypt</button>
            <button id="qr-btn" disabled>QR</button>
            <button id="copy-btn" class="accent" disabled>Copy</button>
            <button id="palette-btn" disabled>⌘K</button>
            <button id="clear-btn" class="danger">Clear</button>
        </div>
    </header>

    <div id="tab-strip"></div>
    <div id="search-bar"></div>

    <main>
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <span class="loading-text">initializing runtime</span>
        </div>
        <div id="editor-wrapper">
            <div id="line-numbers">1</div>
            <pre id="highlight-layer"><br></pre>
            <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="start typing, paste, or drop a file…"></textarea>
        </div>
    </main>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Ready</span>
            </div>
            <span id="storage-mode">[URL]</span>
        </div>
        <span id="url-size">0 B</span>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">modal</span>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="password-form" id="password-form">
                <input type="password" id="password-input" placeholder="Enter password">
                <input type="password" id="password-confirm" placeholder="Confirm password">
                <button id="password-submit" class="primary">Submit</button>
            </div>
            <canvas id="qr-canvas"></canvas>
            <div id="docs-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"
            integrity="sha384-wgi7s9Y2xefdDru3II6Xb11y/YNoKVbuydTikWejwId9z2xRd8SveCTrJjj/QAnH"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"
            integrity="sha384-lQXOAyZwHXE55JFyrOMB7nY2Wv+m5ZWNtJcHrd1rceRQXAYNLak8ukN5TjBTcIwz"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"
            integrity="sha384-+pxiN6T7yvpryuJmE1gM9PX7yQit15auDb+ZwwvJOd/4be2Cie5/IuVXgQb/S9du"
            crossorigin="anonymous"></script>
    <script src="app.js"></script>
    <script src="extras.js"></script>
</body>
</html>
